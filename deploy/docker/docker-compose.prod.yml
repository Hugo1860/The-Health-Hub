version: '3.8'

services:
  health-hub:
    image: ghcr.io/${GH_OWNER:-${COMPOSE_PROJECT_NAME:-health-hub-owner}}/the-health-hub:${TAG:-latest}
    container_name: health-hub-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_SSL=${DB_SSL:-false}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - PORT=3000
      - HOST=0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - health-hub-data:/app/data
      - health-hub-uploads:/app/public/uploads
      - health-hub-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - health-hub-network

  nginx:
    image: nginx:alpine
    container_name: health-hub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
      - health-hub-uploads:/var/www/uploads:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - health-hub
    networks:
      - health-hub-network

  postgres:
    image: postgres:15
    container_name: health-hub-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - health-hub-network

volumes:
  health-hub-data:
  health-hub-uploads:
  health-hub-logs:
  nginx-logs:
  postgres_data:

networks:
  health-hub-network:
    driver: bridge


